  <main class="content-section">
    <div class="header">
      <div class="icon-badge">
        <span class="material-symbols-outlined">account_balance</span>
      </div>

      <h2 class="form-title">Ritual & Rhythm</h2>
      <p class="form-subtitle">Inicia sesión para continuar tu viaje cultural.</p>
    </div>
    <form class="login-form" (submit)="onLogin()">
      <div class="form-group">
        <label>NOMBRE DE USUARIO</label>
        <div class="input-container">
          <span class="material-symbols-outlined icon-left">person</span>
          <input type="text" placeholder="ej. dancer_ritual" [(ngModel)]="nombre" name="nombre" required>
        </div>
      </div>

      <div class="form-group">
        <label>CONTRASEÑA</label>
        <div class="input-container">
          <span class="material-symbols-outlined icon-left">lock</span>
          <input type="password" placeholder="••••••••" [(ngModel)]="contrasena" name="contrasena" required>
          <span class="material-symbols-outlined icon-right">visibility</span>
        </div>
      </div>

      <div class="form-actions">
        <label class="checkbox-label">
          <input type="checkbox"> Recordarme
        </label>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
      <div class="footer">
        <button type="submit" class="btn-submit">
          @if(!loading){
          <span>LOG IN</span>
          }
          @if(loading){
          <button class="btn">
            <span class="loading loading-spinner"></span>
            cargando...
          </button>
          }
        </button>
        @if(errorMsg){
        <p style="color:red; margin-top:10px;">
          {{ errorMsg }}
        </p>
        }
        <p class="footer-text">
          ¿No tienes una cuenta? <a href="#" class="register-link">Regístrate</a>
        </p>
      </div>
    </form>




  </main>
</div>
