<div class="main-page">
  <main class="content-section">
    <div class="header">
      <div class="icon-badge">
        <span class="material-symbols-outlined">account_balance</span>
      </div>

      <h2 class="form-title">Monteira</h2>
      <p class="form-subtitle">Inicia sesión para continuar a túa viaxe cultural.</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">

      <div class="form-group">
        <label>NOME DE USUARIO</label>
        <div class="input-container">
          <span class="material-symbols-outlined icon-left">person</span>
          <input type="text" placeholder="ej. bailador_monteira" [(ngModel)]="credenciales.nombre" name="nombre" required>
        </div>
      </div>

      <div class="form-group">
        <label>CONTRASINAL</label>
        <div class="input-container">
          <span class="material-symbols-outlined icon-left">lock</span>

          <input [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"
            [(ngModel)]="credenciales.contrasena" name="contrasena" required>

          <span class="material-symbols-outlined icon-right" style="cursor: pointer;" (click)="togglePassword()"
            title="{{ showPassword ? 'Ocultar contrasinal' : 'Ver contrasinal' }}">
            {{ showPassword ? 'visibility_off' : 'visibility' }}
          </span>
        </div>
      </div>

      <div class="form-actions">
        <label class="checkbox-label">
          <input type="checkbox"> Recordarme
        </label>
        <a href="javascript:void(0)" class="forgot-link">¿Olvidaches o teu contrasinal?</a>
      </div>

      <div class="footer">
        @if(errorMsg){

        <p style="color:red; margin-bottom: 10px;">

          {{ errorMsg }}

        </p>
      }
        <button type="submit" class="btn-submit" [disabled]="loading">
          @if (!loading) {
          <span>LOG IN</span>
          } @else {
          <span class="spinner">Cargando...</span>
          }
        </button>

        <p class="footer-text">
          ¿No tes conta? <a routerLink="/registro" class="register-link">Rexístrate</a>
        </p>
      </div>
    </form>
  </main>
</div>
