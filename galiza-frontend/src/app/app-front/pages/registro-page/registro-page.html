<div class="main-page">
  <main class="content-section">
    <div class="header">
      <div class="icon-badge">
        <span class="material-symbols-outlined">person_add</span>
      </div>

      <h2 class="form-title">Únete a Ritual & Rhythm</h2>
      <p class="form-subtitle">Crea tu cuenta para empezar tu viaje cultural.</p>
    </div>

    <form class="login-form" (submit)="onRegistrar()">
      <div class="form-group">
        <label>NOMBRE DE USUARIO</label>
        <div class="input-container">
          <span class="material-symbols-outlined icon-left">person</span>
          <input type="text" placeholder="Elige tu nombre de usuario" [(ngModel)]="usuario.nombre" name="nombre"
            required>
        </div>
      </div>

      <div class="form-group">
        <label>CONTRASEÑA</label>
        <div class="input-container">
          <span class="material-symbols-outlined icon-left">lock</span>
          <input type="password" placeholder="Contraseña" [(ngModel)]="usuario.contrasena" name="contrasena" required>
          <span class="material-symbols-outlined icon-right">visibility</span>
        </div>
      </div>


      <div class="footer">
        <button type="submit" class="btn-submit" [disabled]="loading">
          @if(!loading){
          <span>CREAR CUENTA</span>
          }
          @if(loading){
          <span>Procesando...</span>
          }
        </button>
        @if(errorMsg){
        <p style="color:red; margin-top:10px;">
          {{ errorMsg }}
        </p>
        }
        <p class="footer-text">
          ¿Ya tienes una cuenta? <a routerLink="/login" class="register-link">Inicia sesión</a>
        </p>
      </div>
    </form>
  </main>
</div>
